<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Page Not Found</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0f172a;
      color:white;
      text-align:center;
      padding:20px;
    }

    .container{
      max-width:600px;
    }

    h1{
      font-size:120px;
      color:#38bdf8;
      margin-bottom:10px;
    }

    h2{
      font-size:32px;
      margin-bottom:15px;
    }

    p{
      color:#cbd5e1;
      font-size:18px;
      line-height:1.6;
      margin-bottom:30px;
    }

    a{
      display:inline-block;
      padding:14px 28px;
      background:#38bdf8;
      color:#000;
      text-decoration:none;
      font-weight:bold;
      border-radius:10px;
      transition:0.3s;
    }

    a:hover{
      background:white;
      transform:scale(1.05);
    }

    .emoji{
      font-size:55px;
      margin-bottom:15px;
      animation:float 2s infinite ease-in-out;
    }

    @keyframes float{
      0%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-10px);
      }
      100%{
        transform:translateY(0px);
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="emoji">🥥</div>

    <h1>404</h1>

    <h2>Page Not Found</h2>

    <p>
      Oops! Jo page aap dhund rahe ho wo exist nahi karta
      ya move ho chuka hai.
    </p>

    <a href="/">Go Back Home</a>

  </div>

</body>
</html>
